<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>肉孜节快乐 - Eid al-Fitr Mubarak</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 页面整体样式 */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 温馨渐变节日背景 */
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ffd1d7 100%);
            overflow: hidden;
            position: relative;
            text-align: center;
            padding: 20px;
        }

        /* 烟花画布 */
        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 祝福卡片 */
        .card {
            position: relative;
            z-index: 10;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.85);
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: fadeIn 1.5s ease;
        }

        /* 标题动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-size: 42px;
            color: #c93e35;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .arabic {
            font-size: 26px;
            color: #8b0000;
            margin: 15px 0;
        }

        .blessing {
            font-size: 20px;
            line-height: 1.8;
            color: #333;
            margin: 20px 0;
        }

        .small-text {
            font-size: 16px;
            color: #666;
            margin-top: 30px;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .title { font-size: 32px; }
            .arabic { font-size: 22px; }
            .blessing { font-size: 18px; }
            .card { padding: 35px 20px; }
        }
        .zuozhe {
            color: #777;
            font-size: 14px;
            margin-top: 15px;

        }
    </style>
</head>
<body>
    <!-- 烟花动画画布 -->
    <canvas id="fireworks"></canvas>

    <!-- 祝福内容 -->
    <div class="card">
        <h1 class="title">肉孜节快乐</h1>
        <p class="arabic"> Eyitigizga Mubarak bolsun</p>
        <p class="blessing">
            愿真主接受你的善功，<br>
            赐你与家人平安、健康、幸福、吉祥！<br>
            愿节日的喜悦洒满你的生活，<br>
            万事如意，吉庆安康！
        </p>
        <p class="small-text">开斋节吉祥 · Eid al-Fitr Mubarak</p>
        <p class="zuozhe">作者:艾力乃孜尔</p>
    </div>

    <script>
        // 烟花动画效果
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        let particles = [];
        function createFirework(x, y) {
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: x, y: y,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 3 + 2,
                    angle: Math.random() * Math.PI * 2,
                    gravity: 0.05,
                    opacity: 1,
                    decay: Math.random() * 0.02 + 0.005,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`
                });
            }
        }

        function animate() {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'lighter';

            particles.forEach((p, i) => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.globalAlpha = p.opacity;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(0, 0, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                p.x += Math.cos(p.angle) * p.speed;
                p.y += Math.sin(p.angle) * p.speed + p.gravity;
                p.opacity -= p.decay;
                if (p.opacity <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }

        // 自动放烟花
        setInterval(() => {
            createFirework(Math.random() * width, Math.random() * height * 0.7);
        }, 600);
        animate();

        // 窗口大小适配
        window.onresize = () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        };
    </script>
</body>
</html>
