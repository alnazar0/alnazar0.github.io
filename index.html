<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古尔邦节快乐 - Eid al-Adha Mubarak</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体样式 */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d0221 100%);
            overflow: hidden;
            position: relative;
            text-align: center;
            padding: 20px;
            font-family: 'Noto Serif SC', serif;
        }

        /* 动态背景粒子 */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 浮动装饰元素 */
        .floating-decor {
            position: fixed;
            z-index: 2;
            pointer-events: none;
            opacity: 0.6;
            animation: float 6s ease-in-out infinite;
        }

        .moon {
            top: 10%;
            right: 15%;
            font-size: 80px;
            filter: drop-shadow(0 0 30px #ffd700);
            animation-delay: 0s;
        }

        .star1 {
            top: 20%;
            left: 10%;
            font-size: 40px;
            filter: drop-shadow(0 0 20px #ffd700);
            animation-delay: 1s;
        }

        .star2 {
            top: 70%;
            right: 20%;
            font-size: 50px;
            filter: drop-shadow(0 0 25px #ffd700);
            animation-delay: 2s;
        }

        .star3 {
            bottom: 15%;
            left: 15%;
            font-size: 35px;
            filter: drop-shadow(0 0 18px #ffd700);
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(5deg); }
            50% { transform: translateY(0px) rotate(0deg); }
            75% { transform: translateY(20px) rotate(-5deg); }
        }

        /* 祝福卡片 */
        .card {
            position: relative;
            z-index: 10;
            max-width: 750px;
            background: linear-gradient(135deg, 
                rgba(255, 215, 0, 0.1) 0%, 
                rgba(255, 215, 0, 0.2) 50%, 
                rgba(255, 215, 0, 0.1) 100%);
            backdrop-filter: blur(20px);
            padding: 70px 50px;
            border-radius: 30px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 
                0 0 60px rgba(255, 215, 0, 0.2),
                0 20px 80px rgba(0, 0, 0, 0.5),
                inset 0 0 60px rgba(255, 215, 0, 0.05);
            animation: cardAppear 2s ease;
        }

        @keyframes cardAppear {
            0% { 
                opacity: 0; 
                transform: translateY(100px) scale(0.8) rotateX(20deg); 
            }
            100% { 
                opacity: 1; 
                transform: translateY(0) scale(1) rotateX(0deg); 
            }
        }

        /* 顶部装饰 */
        .top-decor {
            margin-bottom: 30px;
        }

        .crescent {
            font-size: 60px;
            color: #ffd700;
            filter: drop-shadow(0 0 20px #ffd700);
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { 
                filter: drop-shadow(0 0 20px #ffd700);
                transform: scale(1);
            }
            50% { 
                filter: drop-shadow(0 0 40px #ffd700);
                transform: scale(1.1);
            }
        }

        .title {
            font-size: 56px;
            color: #ffd700;
            margin-bottom: 20px;
            font-weight: 700;
            text-shadow: 
                0 0 10px #ffd700,
                0 0 20px #ffd700,
                0 0 30px #ffd700,
                0 0 40px rgba(255, 215, 0, 0.5);
            animation: titleShimmer 4s ease-in-out infinite;
            letter-spacing: 8px;
        }

        @keyframes titleShimmer {
            0%, 100% { 
                text-shadow: 
                    0 0 10px #ffd700,
                    0 0 20px #ffd700,
                    0 0 30px #ffd700;
            }
            50% { 
                text-shadow: 
                    0 0 20px #ffd700,
                    0 0 40px #ffd700,
                    0 0 60px #ffd700,
                    0 0 80px rgba(255, 215, 0, 0.8);
            }
        }

        .arabic-title {
            font-size: 42px;
            color: #ffeb99;
            margin: 25px 0;
            font-weight: 700;
            font-family: 'Amiri', serif;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(255, 235, 153, 0.5);
            animation: fadeInScale 2.5s ease;
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 30px 0;
            gap: 15px;
        }

        .divider-line {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
        }

        .divider-star {
            color: #ffd700;
            font-size: 24px;
            filter: drop-shadow(0 0 10px #ffd700);
        }

        .blessing {
            font-size: 24px;
            line-height: 2.2;
            color: #fff8dc;
            margin: 35px 0;
            padding: 30px;
            background: linear-gradient(135deg, 
                rgba(255, 215, 0, 0.05) 0%, 
                rgba(255, 215, 0, 0.15) 100%);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            position: relative;
            animation: blessingFade 3s ease;
        }

        .blessing::before {
            content: '"';
            position: absolute;
            top: -10px;
            left: 20px;
            font-size: 60px;
            color: #ffd700;
            opacity: 0.5;
            font-family: Georgia, serif;
        }

        .blessing::after {
            content: '"';
            position: absolute;
            bottom: -30px;
            right: 20px;
            font-size: 60px;
            color: #ffd700;
            opacity: 0.5;
            font-family: Georgia, serif;
        }

        @keyframes blessingFade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .small-text {
            font-size: 20px;
            color: #ffeb99;
            margin-top: 40px;
            font-weight: 500;
            letter-spacing: 2px;
            animation: fadeIn 4s ease;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .zuozhe {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-top: 25px;
            letter-spacing: 3px;
        }

        /* 底部装饰 */
        .bottom-decor {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .decor-dot {
            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            animation: dotPulse 2s ease-in-out infinite;
            box-shadow: 0 0 10px #ffd700;
        }

        .decor-dot:nth-child(1) { animation-delay: 0s; }
        .decor-dot:nth-child(2) { animation-delay: 0.2s; }
        .decor-dot:nth-child(3) { animation-delay: 0.4s; }
        .decor-dot:nth-child(4) { animation-delay: 0.6s; }
        .decor-dot:nth-child(5) { animation-delay: 0.8s; }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .card { padding: 50px 30px; }
            .title { font-size: 40px; letter-spacing: 4px; }
            .arabic-title { font-size: 32px; }
            .blessing { font-size: 18px; padding: 20px; }
            .small-text { font-size: 16px; }
            .moon { font-size: 50px; }
            .crescent { font-size: 45px; }
            .divider-line { width: 60px; }
        }
    </style>
</head>
<body>
    <!-- 粒子背景 -->
    <canvas id="particles"></canvas>

    <!-- 浮动装饰 -->
    <div class="floating-decor moon">🌙</div>
    <div class="floating-decor star1">⭐</div>
    <div class="floating-decor star2">✨</div>
    <div class="floating-decor star3">⭐</div>

    <!-- 祝福内容 -->
    <div class="card">
        <div class="top-decor">
            <div class="crescent">☪</div>
        </div>
        
        <h1 class="title">古尔邦节快乐</h1>
        
        <p class="arabic-title">𝑨𝒚𝒂𝒎 𝑴𝒖𝒃𝒂𝒓𝒂𝑲</p>
        
        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-star">✦</span>
            <div class="divider-line"></div>
        </div>
        
        <p class="blessing">
            在这神圣而美好的节日里<br>
            愿真主接受你的奉献与牺牲<br>
            赐你与家人平安、健康、幸福、吉祥<br>
            愿节日的喜悦洒满你的生活<br>
            阖家欢乐，万事如意！
        </p>
        
        <p class="small-text">宰牲节吉祥 · Eid al-Adha Mubarak</p>
        
        <div class="bottom-decor">
            <div class="decor-dot"></div>
            <div class="decor-dot"></div>
            <div class="decor-dot"></div>
            <div class="decor-dot"></div>
            <div class="decor-dot"></div>
        </div>
        
        <p class="zuozhe">作者:艾力乃孜尔</p>
    </div>

    <script>
        // 粒子效果
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const particles = [];
        const particleCount = 100;

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.hue = 45 + Math.random() * 20; // 金色系
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > width) this.speedX *= -1;
                if (this.y < 0 || this.y > height) this.speedY *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.opacity})`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsla(${this.hue}, 100%, 60%, ${this.opacity})`;
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 150) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 215, 0, ${0.1 * (1 - distance / 150)})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            connectParticles();
            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.onresize = () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        };
    </script>
</body>
</html>
