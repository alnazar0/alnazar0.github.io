<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古尔邦节快乐 - Eid al-Adha Mubarak</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 页面整体样式 */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 古尔邦节主题背景 - 金色和绿色渐变 */
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 30%, #4a7c59 60%, #c9a227 100%);
            overflow: hidden;
            position: relative;
            text-align: center;
            padding: 20px;
        }

        /* 装饰性星星背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #ffd700;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 祝福卡片 */
        .card {
            position: relative;
            z-index: 10;
            max-width: 700px;
            background: linear-gradient(145deg, rgba(255, 248, 220, 0.95), rgba(255, 235, 180, 0.95));
            padding: 60px 40px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3),
                        0 0 100px rgba(255, 215, 0, 0.2);
            animation: fadeInUp 1.5s ease;
            border: 3px solid #c9a227;
        }

        /* 标题动画 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .title {
            font-size: 48px;
            color: #1a472a;
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1), 0 0 10px rgba(201, 162, 39, 0.3); }
            to { text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1), 0 0 20px rgba(201, 162, 39, 0.6); }
        }

        .arabic-title {
            font-size: 36px;
            color: #8b4513;
            margin: 20px 0 10px 0;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .blessing {
            font-size: 22px;
            line-height: 2;
            color: #333;
            margin: 30px 0;
            background: rgba(255, 255, 255, 0.5);
            padding: 25px;
            border-radius: 15px;
            border-left: 4px solid #c9a227;
        }

        .small-text {
            font-size: 18px;
            color: #1a472a;
            margin-top: 30px;
            font-weight: 500;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .title { font-size: 36px; }
            .arabic-title { font-size: 28px; }
            .blessing { font-size: 18px; }
            .card { padding: 40px 25px; }
        }
        .zuozhe {
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }

        /* 装饰性元素 */
        .decoration {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 60px;
            color: #c9a227;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }
    </style>
</head>
<body>
    <!-- 装饰性星星背景 -->
    <div class="stars" id="stars"></div>

    <!-- 祝福内容 -->
    <div class="card">
        <div class="decoration">✨</div>
        <h1 class="title">古尔邦节快乐</h1>
        <p class="arabic-title">𝑨𝒚𝒂𝒎 𝑴𝒖𝒃𝒂𝒓𝒂𝑲</p>
        <p class="blessing">
            愿真主接受你的奉献与牺牲，<br>
            赐你与家人平安、健康、幸福、吉祥！<br>
            愿节日的喜悦洒满你的生活，<br>
            阖家欢乐，万事如意！
        </p>
        <p class="small-text">宰牲节吉祥 · Eid al-Adha Mubarak</p>
        <p class="zuozhe">作者:艾力乃孜尔</p>
    </div>

    <script>
        // 生成装饰性星星
        const starsContainer = document.getElementById('stars');
        const starCount = 50;

        function createStars() {
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = (Math.random() * 20 + 10) + 'px';
                star.style.height = (Math.random() * 20 + 10) + 'px';
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                starsContainer.appendChild(star);
            }
        }

        // 初始化星星
        createStars();

        // 窗口大小变化时重新生成星星
        window.onresize = () => {
            starsContainer.innerHTML = '';
            createStars();
        };
    </script>
</body>
</html>
